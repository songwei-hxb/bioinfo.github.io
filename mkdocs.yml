site_name: My Personal Site

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式

nav:
  - Home: index.md
  - Wiki:
      - wiki/index.md
  - 生物学:
      - biology/index.md
      - biology/第一堂课.md
      - biology/第二堂课.md      
  - 化学: 
      - chemistry/index.md
